name: Update Google Fonts Listing

on:
  schedule:
    # At 00:00 on day-of-month 1 in January, March, June, September, and December
    - cron: '0 0 1 1,3,6,9,12 *'
  workflow_dispatch:

jobs:
  update:
    # runs-on: ubuntu-slim
    runs-on: ubuntu-latest
    if: github.repository_owner == 'LawnchairLauncher'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/fonts.requirements.txt
      - name: Update fonts
        run: python .github/font_update.py
        env:
          GCLOUD_FONTS_CREDENTIALS: ${{ secrets.GCLOUD_FONTS_CREDENTIALS }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: New Google Fonts listing by GitHub Action"
          title: "feat: New Google Fonts listing by GitHub Action"
          body: "feat: New Google Fonts listing by GitHub Action"
          branch: "feat/update-google-fonts-listing"
          delete-branch: true
