name: Update Google Fonts Listing

on:
  schedule:
    # At 00:00 on day-of-month 1 in January, March, June, September, and December
    - cron: "0 0 1 1,3,6,9,12 *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'LawnchairLauncher'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/fonts.requirements.txt

      - name: Update fonts
        run: python .github/font_update.py >> $GITHUB_STEP_SUMMARY
        env:
          GCLOUD_FONTS_CREDENTIALS: ${{ secrets.GCLOUD_FONTS_CREDENTIALS }}

      - name: Get current readable date
        run: echo "FRESH_DATE=$(date +'%d%m%Y')" >> $GITHUB_ENV

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: |
            Update Google Fonts listing to ${{ env.FRESH_DATE }}

            _Auto-generated by `${{ github.workflow }}` workflow._
          title: "feat: Update Google Fonts listing to ${{ env.FRESH_DATE }}"
          body: |
            ${{ env.GITHUB_STEP_SUMMARY }}

            _Auto-generated by `${{ github.workflow }}` GitHub workflow._
          branch: feat/update-google-fonts-listing
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          delete-branch: true
